<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Adivina el Código Oculto</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="lab-environment">
      <div class="glass-door">
        <div class="lock-panel">
          <!-- Header -->
          <div class="panel-header">
            <h1>LABORATORIO ENTER SCHOOL</h1>
            <p class="level">NIVEL 12 — ÁREA RESTRINGIDA</p>

            <!-- Display -->
            <div class="display-screen">
              <p id="statusText">ADIVINA EL CÓDIGO OCULTO</p>
              <p id="hintText">Ingrese un número del 1 al 100</p>
            </div>
          </div>

          <!-- Status -->
          <div class="left-panel">
            <div class="status-bar">
              <span id="systemState">SISTEMA EN ESPERA</span>
            </div>
            <div class="history-panel">
              <div class="history-title">REGISTRO DE INTENTOS</div>
              <div id="historyList" class="history-list"></div>
            </div>
          </div>
          <div class="right-panel">
            <div class="input-wrapper">
              <input type="number" id="inputIntento" readonly />
              <div class="fake-cursor" id="fakeCursor"></div>
            </div>
            <button id="btnVerificar" class="verify-btn">
              VERIFICAR CÓDIGO
            </button>
            <!-- Radar Scanner -->
            <div class="radar-container">
              <div class="radar-label">ESCANEO ACTIVO</div>
              <div class="radar">
                <div class="radar-circle"></div>
                <div class="radar-circle"></div>
                <div class="radar-circle"></div>
                <div class="radar-line-h"></div>
                <div class="radar-line-v"></div>
                <div class="radar-sweep"></div>
                <div class="radar-blip" id="radarBlip"></div>
              </div>
              <div class="radar-status" id="radarStatus">INGRESE CÓDIGO</div>
            </div>
            <!-- Reset -->
            <div class="system-controls">
              <button id="btnReiniciar" class="reset-btn">
                REINICIAR SISTEMA
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
